[versions]
kotlin = "2.3.21"
librarian = "0.2.2-SNAPSHOT"
kotlinx-coroutines = "1.11.0"
kable = "0.43.0"
klibnanolog = "1.2.0"
clikt = "5.1.0"
kotlinx-io = "0.9.0"

[plugins]
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
librarian = { id = "com.gradleup.librarian", version.ref = "librarian" }

[libraries]
kotlinx-coroutines-core = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }
kotlinx-coroutines-jdk9 = { group = "org.jetbrains.kotlinx", name = "kotlinx-coroutines-jdk9", version.ref = "kotlinx-coroutines" }
klibnanolog = { group = "org.jraf.klibnanolog", name = "klibnanolog", version.ref = "klibnanolog" }
kable-core = { group = "com.juul.kable", name = "kable-core", version.ref = "kable" }
clikt = { group = "com.github.ajalt.clikt", name = "clikt", version.ref = "clikt" }
kotlinx-io = { group = "org.jetbrains.kotlinx", name = "kotlinx-io-core", version.ref = "kotlinx-io" }
